<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System History | Quantum AI Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
</head>
<body id="page-history">
    <div id="particle-container"></div>

    <nav class="navbar glass">
        <div class="logo">
            <span class="badge">ELITE</span>
            QUANTUM <span style="color:var(--accent-primary)">AI</span>
        </div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/quantum">Quantum Logic</a>
            <a href="/hebbian">Hebbian Space</a>
            <a href="/history" class="active">System History</a>
        </div>
    </nav>

    <main class="content-wrapper">
        <section class="history-section">
            <div class="history-container glass">
                <h2 class="section-title">Centralized Simulation Logs</h2>
                <p>Track every quantum transformation and neural training sequence persisted in the system database.</p>
                
                <div style="margin-top: 40px; overflow-x: auto;">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Type</th>
                                <th>Operation</th>
                                <th>Snapshot</th>
                            </tr>
                        </thead>
                        <tbody id="history-body">
                            <!-- Logs generated by main.js -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
