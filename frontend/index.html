<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum AI | Ultimate Edition</title>
    <meta name="description" content="The world's most comprehensive Quantum Computing and AI simulation platform.">
    
    <!-- React + MUI (JSDelivr Stable) -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emotion/react@11/dist/emotion-react.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emotion/styled@11/dist/emotion-styled.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mui/material@5.14.0/umd/material-ui.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #03030a; color: #e0e0e0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        #root { min-height: 100vh; }
        .neon-cyan { color: #00f2ff; text-shadow: 0 0 10px rgba(0,242,255,0.6); }
        .neon-purple { color: #a855f7; text-shadow: 0 0 10px rgba(168,85,247,0.6); }
        .neon-gold { color: #fbbf24; text-shadow: 0 0 10px rgba(251,191,36,0.5); }
        .neon-pink { color: #f472b6; text-shadow: 0 0 10px rgba(244,114,182,0.5); }
        .glass { background: rgba(8,8,20,0.92) !important; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.07) !important; }
        .accent-bar { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #00f2ff, #a855f7, #f472b6); }
        .loading-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #03030a; gap: 20px; }
        .loading-screen h1 { font-family: 'Orbitron'; color: #00f2ff; letter-spacing: 8px; font-size: 1.2rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .stat-card { transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,242,255,0.15); }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-screen">
            <h1>QUANTUM AI</h1>
            <div style="color: #555; font-size: 0.7rem; letter-spacing: 3px;">ASSEMBLING NEURAL CORE...</div>
        </div>
    </div>

    <script type="text/babel">
        const { ThemeProvider, createTheme, CssBaseline, Box, AppBar, Toolbar, Typography, Button, Container, Dialog, IconButton, Fade, Table, TableBody, TableCell, TableHead, TableRow, Grid, Paper, Select, MenuItem, Divider, LinearProgress, CircularProgress, Slider, Chip } = MaterialUI;

        const theme = createTheme({ palette: { mode: 'dark', primary: { main: '#00f2ff' }, secondary: { main: '#a855f7' }, error: { main: '#f472b6' }, warning: { main: '#fbbf24' }, background: { default: '#03030a', paper: '#0a0a1a' } }, typography: { fontFamily: 'Inter, sans-serif' } });

        // ═══════════════ SHARED COMPONENTS ═══════════════
        function ZoomDialog({ open, onClose, chartData, title, type="bar" }) {
            const ref = React.useRef(null); const cRef = React.useRef(null);
            React.useEffect(() => { if (open && ref.current) { if (cRef.current) cRef.current.destroy(); cRef.current = new Chart(ref.current, { type, data: chartData, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#ccc' } } } } }); } }, [open, chartData]);
            return (<Dialog fullScreen open={open} onClose={onClose} TransitionComponent={Fade}><Box sx={{ p: 4, height: '100vh', display: 'flex', flexDirection: 'column', bgcolor: '#03030a' }}><Box sx={{ display: 'flex', justifyContent: 'space-between', mb: 3 }}><Typography variant="h4" sx={{ fontFamily: 'Orbitron', color: '#00f2ff' }}>{title}</Typography><Button variant="outlined" color="primary" onClick={onClose}>Close</Button></Box><Box sx={{ flex: 1, bgcolor: '#000', p: 3, borderRadius: 2 }}><canvas ref={ref}></canvas></Box></Box></Dialog>);
        }

        function QChart({ data, type="bar", title, height=250 }) {
            const ref = React.useRef(null); const cRef = React.useRef(null); const [zoom, setZoom] = React.useState(false);
            React.useEffect(() => { if (ref.current) { if (cRef.current) cRef.current.destroy(); cRef.current = new Chart(ref.current, { type, data, options: { responsive: true, maintainAspectRatio: false, scales: type !== 'pie' && type !== 'doughnut' ? { y: { grid: { color: '#151520' } }, x: { grid: { display: false } } } : undefined } }); } }, [data, type]);
            return (<Box sx={{ position: 'relative', height }}><canvas ref={ref}></canvas><IconButton size="small" sx={{ position: 'absolute', top: 4, right: 4, bgcolor: 'rgba(0,0,0,0.6)', fontSize: '0.7rem' }} onClick={() => setZoom(true)}>🔍</IconButton><ZoomDialog open={zoom} onClose={() => setZoom(false)} chartData={data} title={title || "Analyzer"} type={type} /></Box>);
        }

        function SectionTitle({ icon, title, subtitle, color="primary.main" }) {
            return (<Box sx={{ mb: 4 }}><Typography variant="h4" sx={{ fontFamily: 'Orbitron', fontWeight: 900, color }}>{icon} {title}</Typography>{subtitle && <Typography variant="body2" sx={{ color: 'grey.600', mt: 1 }}>{subtitle}</Typography>}</Box>);
        }

        // ═══════════════ PAGE 1: MISSION CONTROL ═══════════════
        function MissionControl() {
            const [stats, setStats] = React.useState({ total: 0, quantum: 0, hebbian: 0, physics: 0, mechanics: 0, qml: 0, qdl: 0, qllm: 0 });
            React.useEffect(() => { fetch('/api/stats').then(r=>r.json()).then(setStats).catch(()=>{}); }, []);
            const nav = (to) => { window.history.pushState({}, '', to); window.dispatchEvent(new PopStateEvent('popstate')); };
            const cards = [
                { title: 'Quantum Gates', value: stats.quantum, route: '/quantum', color: '#00f2ff', icon: '⚛️' },
                { title: 'Physics Lab', value: stats.physics, route: '/physics', color: '#fbbf24', icon: '🌊' },
                { title: 'QM Engine', value: stats.mechanics, route: '/mechanics', color: '#34d399', icon: '🔬' },
                { title: 'Neural Hub', value: stats.hebbian, route: '/hebbian', color: '#a855f7', icon: '🧠' },
                { title: 'Quantum ML', value: stats.qml, route: '/qml', color: '#06b6d4', icon: '📊' },
                { title: 'Quantum DL', value: stats.qdl, route: '/qdl', color: '#f97316', icon: '🤖' },
                { title: 'Quantum LLM', value: stats.qllm, route: '/qllm', color: '#f472b6', icon: '💬' },
                { title: 'Total Runs', value: stats.total, route: '/history', color: '#fff', icon: '📜' },
            ];
            return (
                <Box>
                    <Box sx={{ textAlign: 'center', py: 10 }}>
                        <Typography variant="overline" sx={{ color: 'primary.main', letterSpacing: 8, fontSize: '0.7rem' }}>ULTIMATE EDITION v18</Typography>
                        <Typography variant="h1" sx={{ fontFamily: 'Orbitron', fontWeight: 900, mt: 2, fontSize: { xs: '2rem', md: '4rem' } }} className="neon-cyan">QUANTUM AI</Typography>
                        <Typography variant="body1" sx={{ color: 'grey.500', mt: 3, maxWidth: 700, mx: 'auto', lineHeight: 2 }}>The world's most comprehensive Quantum Computing and Artificial Intelligence simulation platform. Spanning Quantum Physics, Mechanics, Machine Learning, Deep Learning, and Large Language Models.</Typography>
                    </Box>
                    <Grid container spacing={3} sx={{ mt: 2 }}>
                        {cards.map((c, i) => (
                            <Grid item xs={6} md={3} key={i}>
                                <Paper className="glass stat-card" sx={{ p: 4, textAlign: 'center', position: 'relative', overflow: 'hidden', cursor: 'pointer' }} onClick={() => nav(c.route)}>
                                    <Box sx={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '3px', bgcolor: c.color }} />
                                    <Typography sx={{ fontSize: '2rem', mb: 1 }}>{c.icon}</Typography>
                                    <Typography variant="h3" sx={{ fontFamily: 'Orbitron', fontWeight: 900, color: c.color }}>{c.value}</Typography>
                                    <Typography variant="caption" sx={{ color: 'grey.500', mt: 1, display: 'block', letterSpacing: 2 }}>{c.title.toUpperCase()}</Typography>
                                </Paper>
                            </Grid>
                        ))}
                    </Grid>
                </Box>
            );
        }

        // ═══════════════ PAGE 2: PHYSICS LAB ═══════════════
        function PhysicsLab() {
            const [slitData, setSlitData] = React.useState(null);
            const [tunnelData, setTunnelData] = React.useState(null);
            const [schData, setSchData] = React.useState(null);
            const [wavelength, setWavelength] = React.useState(0.01);
            const [energy, setEnergy] = React.useState(3.0);
            const [potential, setPotential] = React.useState('harmonic');
            const [loading, setLoading] = React.useState('');

            const runSlit = async () => { setLoading('slit'); const r = await fetch('/api/physics/double_slit', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ wavelength, slit_distance: 0.5, screen_distance: 2.0 }) }); setSlitData(await r.json()); setLoading(''); };
            const runTunnel = async () => { setLoading('tunnel'); const r = await fetch('/api/physics/tunneling', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ barrier_height: 5.0, barrier_width: 1.0, particle_energy: energy }) }); setTunnelData(await r.json()); setLoading(''); };
            const runSchrodinger = async () => { setLoading('sch'); const r = await fetch('/api/physics/schrodinger', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ potential_type: potential, num_states: 5 }) }); setSchData(await r.json()); setLoading(''); };

            return (
                <Box>
                    <SectionTitle icon="🌊" title="Quantum Physics Laboratory" subtitle="Wave-particle duality, quantum tunneling, and Schrodinger eigenstates" color="warning.main" />
                    <Grid container spacing={4}>
                        <Grid item xs={12} md={4}>
                            <Paper className="glass" sx={{ p: 4 }}>
                                <Typography variant="h6" sx={{ fontFamily: 'Orbitron', mb: 3 }} className="neon-gold">Double-Slit Experiment</Typography>
                                <Typography variant="caption" color="warning.main">WAVELENGTH (λ)</Typography>
                                <Slider value={wavelength} onChange={(e,v) => setWavelength(v)} min={0.005} max={0.05} step={0.001} sx={{ color: '#fbbf24', mt: 1 }} />
                                <Typography variant="body2" sx={{ color: 'grey.500', mb: 2 }}>λ = {wavelength.toFixed(3)}</Typography>
                                <Button variant="contained" fullWidth sx={{ bgcolor: '#fbbf24', color: '#000', '&:hover': { bgcolor: '#f59e0b' } }} onClick={runSlit} disabled={loading==='slit'}>Simulate Interference</Button>
                            </Paper>
                        </Grid>
                        <Grid item xs={12} md={8}>
                            <Paper className="glass" sx={{ p: 3, height: 350 }}>
                                {slitData ? <QChart data={{ labels: slitData.positions.filter((_,i)=>i%4===0).map(p=>p.toFixed(2)), datasets: [{ label: 'Intensity', data: slitData.intensity.filter((_,i)=>i%4===0), borderColor: '#fbbf24', fill: true, backgroundColor: 'rgba(251,191,36,0.1)', tension: 0.4 }] }} type="line" title="Interference Pattern" height={300} /> : <Box sx={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', color: 'grey.700' }}>Run simulation to see interference pattern</Box>}
                            </Paper>
                        </Grid>
                        <Grid item xs={12} md={4}>
                            <Paper className="glass" sx={{ p: 4 }}>
                                <Typography variant="h6" sx={{ fontFamily: 'Orbitron', mb: 3 }} className="neon-cyan">Quantum Tunneling</Typography>
                                <Typography variant="caption" color="primary">PARTICLE ENERGY</Typography>
                                <Slider value={energy} onChange={(e,v) => setEnergy(v)} min={0.5} max={4.9} step={0.1} sx={{ mt: 1 }} />
                                <Typography variant="body2" sx={{ color: 'grey.500', mb: 2 }}>E = {energy.toFixed(1)} (V₀ = 5.0)</Typography>
                                <Button variant="contained" fullWidth onClick={runTunnel} disabled={loading==='tunnel'}>Simulate Tunneling</Button>
                                {tunnelData && <Box sx={{ mt: 2, p: 2, bgcolor: 'rgba(0,242,255,0.05)', borderRadius: 1 }}><Typography variant="body2">Transmission: <strong style={{color:'#00f2ff'}}>{(tunnelData.transmission*100).toFixed(2)}%</strong></Typography><Typography variant="body2">Reflection: <strong>{(tunnelData.reflection*100).toFixed(2)}%</strong></Typography></Box>}
                            </Paper>
                        </Grid>
                        <Grid item xs={12} md={8}>
                            <Paper className="glass" sx={{ p: 3, height: 350 }}>
                                {tunnelData ? <QChart data={{ labels: tunnelData.positions.filter((_,i)=>i%3===0).map(p=>p.toFixed(2)), datasets: [{ label: 'Wavefunction |ψ|', data: tunnelData.wavefunction.filter((_,i)=>i%3===0), borderColor: '#00f2ff', tension: 0.3, fill: true, backgroundColor: 'rgba(0,242,255,0.05)' }, { label: 'Potential V(x)', data: tunnelData.potential.filter((_,i)=>i%3===0), borderColor: '#f472b6', borderDash: [5,5], fill: false }] }} type="line" title="Quantum Tunneling" height={300} /> : <Box sx={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', color: 'grey.700' }}>Run simulation to see wavefunction</Box>}
                            </Paper>
                        </Grid>
                        <Grid item xs={12} md={4}>
                            <Paper className="glass" sx={{ p: 4 }}>
                                <Typography variant="h6" sx={{ fontFamily: 'Orbitron', mb: 3 }} className="neon-purple">Schrodinger Eigenstates</Typography>
                                <Select fullWidth value={potential} onChange={(e) => setPotential(e.target.value)} size="small" sx={{ mb: 2 }}>
                                    <MenuItem value="harmonic">Harmonic Oscillator</MenuItem>
                                    <MenuItem value="infinite_well">Infinite Square Well</MenuItem>
                                    <MenuItem value="hydrogen">Hydrogen Atom</MenuItem>
                                </Select>
                                <Button variant="contained" color="secondary" fullWidth onClick={runSchrodinger} disabled={loading==='sch'}>Compute Eigenstates</Button>
                                {schData && <Box sx={{ mt: 2 }}>{schData.energies.map((e,i) => <Chip key={i} label={`E${i} = ${e.toFixed(3)}`} size="small" sx={{ m: 0.5, bgcolor: 'rgba(168,85,247,0.15)', color: '#a855f7' }} />)}</Box>}
                            </Paper>
                        </Grid>
                        <Grid item xs={12} md={8}>
                            <Paper className="glass" sx={{ p: 3, height: 350 }}>
                                {schData ? <QChart data={{ labels: schData.positions.filter((_,i)=>i%4===0).map(p=>p.toFixed(1)), datasets: schData.states.map((s,i) => ({ label: `ψ${i} (E=${schData.energies[i].toFixed(2)})`, data: s.filter((_,j)=>j%4===0), borderColor: ['#00f2ff','#a855f7','#fbbf24','#f472b6','#34d399'][i%5], fill: false, tension: 0.3 })) }} type="line" title="Energy Eigenstates" height={300} /> : <Box sx={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', color: 'grey.700' }}>Compute eigenstates to visualize</Box>}
                            </Paper>
                        </Grid>
                    </Grid>
                </Box>
            );
        }

        // ═══════════════ PAGE 3: QUANTUM MECHANICS ═══════════════
        function MechanicsEngine() {
            const [uncData, setUncData] = React.useState(null);
            const [spinData, setSpinData] = React.useState(null);
            const [hamData, setHamData] = React.useState(null);
            const [oscData, setOscData] = React.useState(null);
            const [theta, setTheta] = React.useState(1.0);
            const [phi, setPhi] = React.useState(0.0);

            const runUnc = async () => { const r = await fetch('/api/mechanics/uncertainty', { method: 'POST' }); setUncData(await r.json()); };
            const runSpin = async () => { const r = await fetch('/api/mechanics/spin', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ theta, phi }) }); setSpinData(await r.json()); };
            const runHam = async () => { const r = await fetch('/api/mechanics/hamiltonian', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ size: 4 }) }); setHamData(await r.json()); };
            const runOsc = async () => { const r = await fetch('/api/mechanics/oscillator', { method: 'POST' }); setOscData(await r.json()); };

            return (
                <Box>
                    <SectionTitle icon="🔬" title="Quantum Mechanics Engine" subtitle="Heisenberg uncertainty, Pauli spin states, Hamiltonian eigendecomposition" color="#34d399" />
                    <Grid container spacing={4}>
                        <Grid item xs={12} md={6}>
                            <Paper className="glass" sx={{ p: 4, position: 'relative' }}><Box className="accent-bar" />
                                <Typography variant="h6" sx={{ fontFamily: 'Orbitron', mb: 2 }}>Heisenberg Uncertainty</Typography>
                                <Button variant="contained" fullWidth onClick={runUnc} sx={{ mb: 2 }}>Compute Δx · Δp</Button>
                                {uncData && <QChart data={{ labels: uncData.delta_x.filter((_,i)=>i%3===0).map(d=>d.toFixed(2)), datasets: [{ label: 'Min Δp (Gaussian)', data: uncData.delta_p_minimum.filter((_,i)=>i%3===0), borderColor: '#00f2ff', fill: false }, { label: 'Spread Δp', data: uncData.delta_p_spread.filter((_,i)=>i%3===0), borderColor: '#f472b6', borderDash: [3,3], fill: false }] }} type="line" title="Uncertainty Principle" height={220} />}
                            </Paper>
                        </Grid>
                        <Grid item xs={12} md={6}>
                            <Paper className="glass" sx={{ p: 4, position: 'relative' }}><Box className="accent-bar" />
                                <Typography variant="h6" sx={{ fontFamily: 'Orbitron', mb: 2 }}>Pauli Spin Analysis</Typography>
                                <Grid container spacing={2} sx={{ mb: 2 }}>
                                    <Grid item xs={6}><Typography variant="caption" color="primary">θ = {theta.toFixed(2)}</Typography><Slider value={theta} onChange={(e,v)=>setTheta(v)} min={0} max={Math.PI} step={0.05} size="small" /></Grid>
                                    <Grid item xs={6}><Typography variant="caption" color="primary">φ = {phi.toFixed(2)}</Typography><Slider value={phi} onChange={(e,v)=>setPhi(v)} min={0} max={2*Math.PI} step={0.05} size="small" /></Grid>
                                </Grid>
                                <Button variant="contained" color="secondary" fullWidth onClick={runSpin} sx={{ mb: 2 }}>Measure Spin</Button>
                                {spinData && <Box><QChart data={{ labels: ['⟨σx⟩', '⟨σy⟩', '⟨σz⟩'], datasets: [{ label: 'Expectation', data: [spinData.expectations.x, spinData.expectations.y, spinData.expectations.z], backgroundColor: ['rgba(0,242,255,0.6)','rgba(168,85,247,0.6)','rgba(244,114,182,0.6)'] }] }} type="bar" title="Spin Expectations" height={180} /><Typography variant="caption" sx={{ color: 'grey.600', mt: 1, display: 'block' }}>Purity: {spinData.purity.toFixed(4)}</Typography></Box>}
                            </Paper>
                        </Grid>
                        <Grid item xs={12} md={6}>
                            <Paper className="glass" sx={{ p: 4, position: 'relative' }}><Box className="accent-bar" />
                                <Typography variant="h6" sx={{ fontFamily: 'Orbitron', mb: 2 }}>Hamiltonian Eigenvalues</Typography>
                                <Button variant="contained" fullWidth onClick={runHam} sx={{ mb: 2, bgcolor: '#34d399', color: '#000', '&:hover': { bgcolor: '#10b981' } }}>Random 4x4 Hamiltonian</Button>
                                {hamData && <Box><QChart data={{ labels: hamData.eigenvalues.map((_,i)=>`λ${i}`), datasets: [{ label: 'Energy', data: hamData.eigenvalues, backgroundColor: hamData.eigenvalues.map(e => e > 0 ? 'rgba(0,242,255,0.6)' : 'rgba(244,114,182,0.6)') }] }} type="bar" title="Energy Spectrum" height={180} /><Typography variant="caption" sx={{ color: 'grey.600' }}>Tr(H) = {hamData.trace.toFixed(4)} | Det(H) = {hamData.determinant.toFixed(4)}</Typography></Box>}
                            </Paper>
                        </Grid>
                        <Grid item xs={12} md={6}>
                            <Paper className="glass" sx={{ p: 4, position: 'relative' }}><Box className="accent-bar" />
                                <Typography variant="h6" sx={{ fontFamily: 'Orbitron', mb: 2 }}>Harmonic Oscillator</Typography>
                                <Button variant="contained" color="warning" fullWidth onClick={runOsc} sx={{ mb: 2 }}>Compute Spectrum</Button>
                                {oscData && <Box><QChart data={{ labels: oscData.levels.map(l=>`n=${l}`), datasets: [{ label: 'Energy (ℏω)', data: oscData.energies, backgroundColor: 'rgba(251,191,36,0.5)', borderColor: '#fbbf24', borderWidth: 1 }] }} type="bar" title="QHO Energy Levels" height={180} /><Typography variant="caption" sx={{ color: 'grey.600' }}>ZPE = {oscData.zero_point_energy} | Spacing = {oscData.spacing}</Typography></Box>}
                            </Paper>
                        </Grid>
                    </Grid>
                </Box>
            );
        }

        // ═══════════════ PAGE 4: QUANTUM CIRCUIT ═══════════════
        function QuantumCircuit() {
            const [n, setN] = React.useState(3); const [target, setTarget] = React.useState(0); const [control, setControl] = React.useState(1);
            const [probs, setProbs] = React.useState([1,0,0,0,0,0,0,0]); const [labels, setLabels] = React.useState(['|000⟩','|001⟩','|010⟩','|011⟩','|100⟩','|101⟩','|110⟩','|111⟩']);
            const [history, setHistory] = React.useState([]); const [blochS, setBlochS] = React.useState({theta:0,phi:0}); const bRef = React.useRef(null);

            React.useEffect(() => { const c = document.getElementById('bloch-3d'); if(!c||bRef.current) return; const sc = new THREE.Scene(); const cam = new THREE.PerspectiveCamera(45,c.clientWidth/c.clientHeight,0.1,1000); cam.position.set(2.5,1.5,2.5); cam.lookAt(0,0,0); const r = new THREE.WebGLRenderer({antialias:true,alpha:true}); r.setSize(c.clientWidth,c.clientHeight); c.appendChild(r.domElement); sc.add(new THREE.Mesh(new THREE.SphereGeometry(1,48,48), new THREE.MeshBasicMaterial({color:0x00f2ff,wireframe:true,transparent:true,opacity:0.05}))); const m=new THREE.LineBasicMaterial({color:0x333333}); sc.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-1.3,0,0),new THREE.Vector3(1.3,0,0)]),m)); sc.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,-1.3,0),new THREE.Vector3(0,1.3,0)]),m)); sc.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,-1.3),new THREE.Vector3(0,0,1.3)]),m)); const ar=new THREE.ArrowHelper(new THREE.Vector3(0,1,0),new THREE.Vector3(0,0,0),1,0x00f2ff,0.1,0.05); sc.add(ar); bRef.current={r,ar,sc,cam}; const anim=()=>{if(bRef.current){requestAnimationFrame(anim);r.render(sc,cam);}}; anim(); }, []);

            const exec = async (g) => { const r=await fetch('/api/quantum/gate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({gate:g,target,control:g==='CNOT'?control:null})}); const d=await r.json(); setProbs(d.probabilities); setLabels(d.labels||labels); setBlochS({theta:d.theta,phi:d.phi}); if(bRef.current) bRef.current.ar.setDirection(new THREE.Vector3(Math.sin(d.theta)*Math.cos(d.phi),Math.cos(d.theta),Math.sin(d.theta)*Math.sin(d.phi))); if(g!=='RESET') setHistory(p=>[...p,{gate:g,target,control:g==='CNOT'?control:null}].slice(-12)); else setHistory([]); };
            const changeN = async (v) => { setN(v); await fetch('/api/quantum/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({n:v})}); setHistory([]); exec('RESET'); };

            return (
                <Box>
                    <SectionTitle icon="⚛️" title="Quantum Circuit Builder" subtitle="N-qubit register simulation with full gate palette and Bloch diagnostics" />
                    <Grid container spacing={3}>
                        <Grid item xs={12} lg={4}>
                            <Paper className="glass" sx={{ p: 4, position: 'relative' }}><Box className="accent-bar" />

                                <Box sx={{ mb: 3 }}><Typography variant="caption" color="primary">REGISTER N</Typography><Box sx={{ display: 'flex', gap: 1, mt: 1 }}>{[2,3,4,5,6].map(v=><Button key={v} variant={n===v?"contained":"outlined"} size="small" onClick={()=>changeN(v)}>N={v}</Button>)}</Box></Box>

                                <Box sx={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 1 }}>
                                    {['H','X','Y','Z'].map(g=><Button key={g} variant="contained" color="secondary" onClick={()=>exec(g)} sx={{fontWeight:900}}>{g}</Button>)}
                                    <Button variant="contained" sx={{gridColumn:'span 2'}} onClick={()=>exec('CNOT')}>CNOT</Button>
                                    <Button variant="outlined" sx={{gridColumn:'span 2'}} onClick={()=>exec('SUPERPOSITION')}>Σ ALL</Button>
                                    <Button variant="text" color="error" sx={{gridColumn:'span 4'}} onClick={()=>exec('RESET')}>RESET</Button>
                                </Box>
                            </Paper>
                        </Grid>
                        <Grid item xs={12} lg={8}>
                            <Paper className="glass" sx={{ p: 3, mb: 3, minHeight: 180 }}>
                                <Typography variant="caption" color="primary">CIRCUIT TRACE (depth: {history.length})</Typography>
                                <Box sx={{ mt: 2, display: 'flex', flexDirection: 'column', gap: 2, overflowX: 'auto' }}>
                                    {[...Array(n)].map((_,q)=>(<Box key={q} sx={{ display: 'flex', alignItems: 'center', gap: 0.5 }}><Typography sx={{ color: '#00f2ff', fontSize: '0.65rem', width: 25, fontFamily: 'Fira Code' }}>Q{q}</Typography><Box sx={{ height: 2, bgcolor: 'rgba(0,242,255,0.1)', flex: 1, position: 'relative', display: 'flex', gap: 4, alignItems: 'center', pl: 1 }}>{history.map((h,i)=>(h.target===q?<Box key={i} sx={{width:24,height:24,bgcolor:h.gate==='CNOT'?'primary.main':'secondary.main',color:'#000',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.5rem',fontWeight:900,borderRadius:0.5,flexShrink:0}}>{h.gate}</Box>:h.gate==='CNOT'&&h.control===q?<Box key={i} sx={{width:24,height:24,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Box sx={{width:6,height:6,borderRadius:'50%',bgcolor:'primary.main'}}/></Box>:<Box key={i} sx={{width:24,height:24,flexShrink:0}}/>))}</Box></Box>))}
                                </Box>
                            </Paper>
                            <Grid container spacing={3}>
                                <Grid item xs={6}><Paper className="glass" sx={{ p: 3, height: 320 }}><Typography variant="caption" color="primary">BLOCH SPHERE</Typography><div id="bloch-3d" style={{height:240}}></div><Box sx={{textAlign:'center'}}><Typography variant="caption" sx={{color:'grey.600'}}>θ={blochS.theta.toFixed(3)} φ={blochS.phi.toFixed(3)}</Typography></Box></Paper></Grid>
                                <Grid item xs={6}><Paper className="glass" sx={{ p: 3, height: 320 }}><Typography variant="caption" color="primary">STATE DENSITY</Typography><Box sx={{height:260}}><QChart data={{labels,datasets:[{label:'P',data:probs,backgroundColor:'rgba(0,242,255,0.4)',borderColor:'#00f2ff',borderWidth:1}]}} title="State Probabilities" height={250} /></Box></Paper></Grid>
                            </Grid>
                        </Grid>
                    </Grid>
                </Box>
            );
        }

        // ═══════════════ PAGE 5: HEBBIAN ═══════════════
        function HebbianHub() {
            const [rule, setRule] = React.useState('oja'); const [latent, setLatent] = React.useState({labels:[],datasets:[{label:'Latent',data:[],borderColor:'#a855f7',fill:false}]}); const [wStats, setWStats] = React.useState(Array(100).fill(0.1)); const [loading, setLoading] = React.useState(false);
            const run = async (batch) => { setLoading(true); const ep=batch?'/api/analyze/hebbian_batch':'/api/analyze/hebbian'; const bd=batch?{samples:20,rule}:{data:Array.from({length:10},()=>Math.random()),rule}; const r=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(bd)}); const d=await r.json(); if(batch){const f=d.results[d.results.length-1]; setWStats(f.weights.concat(Array(100).fill(0)).slice(0,100)); setLatent({labels:d.results.map((_,i)=>i),datasets:[{...latent.datasets[0],data:d.results.map(r=>r.latent_x)}]});}else{setWStats(d.weight_stats.concat(Array(100).fill(0)).slice(0,100)); setLatent(p=>({labels:[...p.labels,""].slice(-20),datasets:[{...p.datasets[0],data:[...p.datasets[0].data,d.projection[0]].slice(-20)}]}));} setLoading(false); };

                            <Paper className="glass" sx={{ p: 3, mt: 3 }}><Typography variant="caption" color="secondary">WEIGHT MATRIX</Typography><Box sx={{ display: 'grid', gridTemplateColumns: 'repeat(10,1fr)', gap: '3px', mt: 2 }}>{wStats.map((w,i)=><Box key={i} sx={{ aspectRatio: '1', borderRadius: '2px', bgcolor: `rgba(168,85,247,${Math.min(1,w*5)})` }} />)}</Box></Paper>

        // ═══════════════ PAGE 6: QUANTUM ML ═══════════════

            const runPCA = async () => { setLoading('pca'); const r=await fetch('/api/qml/pca',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({n_samples:60,epochs:30})}); setPcaData(await r.json()); setLoading(''); };

                        </Grid>

        // ═══════════════ PAGE 8: QUANTUM LLM ═══════════════

                <Box>
                    <SectionTitle icon="💬" title="Quantum LLM Oracle" subtitle="Quantum-inspired attention with Born-rule scoring and wavefunction collapse generation" color="error.main" />
                    <Grid container spacing={4}>
                        <Grid item xs={12} md={5}>
                            <Paper className="glass" sx={{ p: 4 }}>
                                <Typography variant="h6" sx={{ fontFamily: 'Orbitron', mb: 3 }} className="neon-pink">Attention Engine</Typography>

                            <Paper className="glass" sx={{ p: 3 }}><Typography variant="caption" color="error">ENTANGLEMENT SCORES</Typography><Box sx={{ height: 200, mt: 2 }}><QChart data={{labels:attData.tokens,datasets:attData.entanglement_matrix.map((row,i)=>({label:attData.tokens[i],data:row,borderColor:['#f472b6','#a855f7','#00f2ff','#fbbf24','#34d399'][i%5],fill:false}))}} type="line" title="Token Entanglement" height={180} /></Box></Paper></Box>}
