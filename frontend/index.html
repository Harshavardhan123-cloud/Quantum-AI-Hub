<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum AI Hub | Modular React v14</title>
    
    <!-- React & MUI CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@mui/material@latest/umd/material-ui.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <!-- Modular Script Loading -->
    <script type="text/babel" src="src/theme.js"></script>
    <script type="text/babel" src="src/pages/QuantumTerminal.jsx"></script>
    
    <script type="text/babel">
        const { 
            ThemeProvider, CssBaseline, Box, AppBar, Toolbar, Typography, 
            Button, Container, Dialog, IconButton, Fade, Table, TableBody, 
            TableCell, TableHead, TableRow 
        } = MaterialUI;

        // --- Shared Components ---
        function ZoomChartDialog({ open, onClose, chartData, title, type="bar" }) {
            const canvasRef = React.useRef(null);
            const chartRef = React.useRef(null);

            React.useEffect(() => {
                if (open && canvasRef.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    chartRef.current = new Chart(canvasRef.current, {
                        type, data: chartData,
                        options: { responsive: true, maintainAspectRatio: false }
                    });
                }
            }, [open, chartData]);

            return (
                <Dialog fullScreen open={open} onClose={onClose} TransitionComponent={Fade}>
                    <Box sx={{ p: 4, height: '100vh', display: 'flex', flexDirection: 'column', bgcolor: '#0a0a15' }}>
                        <Box sx={{ display: 'flex', justifyContent: 'space-between', mb: 3 }}>
                            <Typography variant="h4" sx={{ fontFamily: 'Orbitron', textShadow: '0 0 10px #00f2ff' }}>{title}</Typography>
                            <Button variant="outlined" color="primary" onClick={onClose}>Exit Analyzer</Button>
                        </Box>
                        <Box sx={{ flex: 1, position: 'relative', bgcolor: 'rgba(255,255,255,0.02)', borderRadius: 2 }}>
                            <canvas ref={canvasRef}></canvas>
                        </Box>
                    </Box>
                </Dialog>
            );
        }

        function EliteChart({ data, type="bar", onZoomClick }) {
            const canvasRef = React.useRef(null);
            const chartRef = React.useRef(null);

            React.useEffect(() => {
                if (canvasRef.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    chartRef.current = new Chart(canvasRef.current, {
                        type, data,
                        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
                    });
                }
            }, [data, type]);

            return (
                <Box sx={{ width: '100%', height: '100%', position: 'relative' }}>
                    <canvas ref={canvasRef}></canvas>
                    <Button variant="text" size="small" sx={{ position: 'absolute', top: 0, right: 0, minWidth: 0 }} onClick={onZoomClick}>🔍</Button>
                </Box>
            );
        }

        window.EliteChart = EliteChart;
        window.ZoomChartDialog = ZoomChartDialog;

        // --- Main App Logic ---
        function App() {
            const [path, setPath] = React.useState(window.location.pathname);

            const navigate = (to) => {
                window.history.pushState({}, '', to);
                setPath(to);
            };

            return (
                <ThemeProvider theme={window.EliteTheme}>
                    <CssBaseline />
                    <Box sx={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
                        <AppBar position="sticky" sx={{ background: 'rgba(5, 5, 10, 0.9)', backdropFilter: 'blur(10px)' }}>
                            <Toolbar sx={{ justifyContent: 'space-between' }}>
                                <Typography variant="h6" sx={{ fontFamily: 'Orbitron', letterSpacing: 2 }}>QUANTUM AI</Typography>
                                <Box sx={{ display: 'flex', gap: 2 }}>
                                    <Button color="inherit" onClick={() => navigate('/')}>Home</Button>
                                    <Button color="inherit" onClick={() => navigate('/quantum')}>Quantum</Button>
                                </Box>
                            </Toolbar>
                        </AppBar>

                        <Container maxWidth="xl" sx={{ flex:1, py: 4 }}>
                            {path === '/quantum' ? <window.QuantumTerminal /> : <Box sx={{textAlign:'center', py:20}}><Typography variant="h2">Workspace Entry Sequence...</Typography><Button variant="contained" sx={{mt:4}} onClick={()=>navigate('/quantum')}>Initialize Quantum Logic</Button></Box>}
                        </Container>
                    </Box>
                </ThemeProvider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
