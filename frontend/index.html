<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum AI</title>
    
    <!-- React & MUI CDNs (Stable Versions) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@mui/material@latest/umd/material-ui.development.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; background-color: #0a0a15; color: #fff; overflow-x: hidden; font-family: 'Inter', sans-serif; }
        #root { min-height: 100vh; }
        .neon-text { text-shadow: 0 0 10px rgba(0, 242, 255, 0.7); }
        .loading-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: #0a0a15; color: #00f2ff; font-family: Orbitron; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-screen">
            Initializing Elite Core...
        </div>
    </div>

    <script type="text/babel">
        // Debugging Hook
        console.log("Elite React: Boot sequence starting...");

        const { 
            ThemeProvider, createTheme, CssBaseline, Box, AppBar, Toolbar, Typography, 
            Button, Container, Dialog, IconButton, Fade, Table, TableBody, 
            TableCell, TableHead, TableRow, Grid, Paper, Select, MenuItem 
        } = MaterialUI;

        // --- Elite Theme ---
        const theme = createTheme({
            palette: {
                mode: 'dark',
                primary: { main: '#00f2ff' },
                secondary: { main: '#7000ff' },
                background: { default: '#0a0a15', paper: 'rgba(10, 10, 21, 0.92)' }
            },
            typography: { fontFamily: 'Inter, sans-serif' },
            components: {
                MuiPaper: {
                    styleOverrides: {
                        root: {
                            backgroundImage: 'none',
                            backdropFilter: 'blur(10px)',
                            border: '1px solid rgba(255, 255, 255, 0.1)'
                        }
                    }
                }
            }
        });

        // --- Shared Components ---
        function ZoomChartDialog({ open, onClose, chartData, title, type="bar" }) {
            const canvasRef = React.useRef(null);
            const chartRef = React.useRef(null);

            React.useEffect(() => {
                if (open && canvasRef.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    chartRef.current = new Chart(canvasRef.current, {
                        type, data: chartData,
                        options: { responsive: true, maintainAspectRatio: false }
                    });
                }
            }, [open, chartData]);

            return (
                <Dialog fullScreen open={open} onClose={onClose} TransitionComponent={Fade}>
                    <Box sx={{ p: 4, height: '100vh', display: 'flex', flexDirection: 'column', bgcolor: '#0a0a15' }}>
                        <Box sx={{ display: 'flex', justifyContent: 'space-between', mb: 3 }}>
                            <Typography variant="h4" sx={{ fontFamily: 'Orbitron', color: '#00f2ff' }}>{title}</Typography>
                            <Button variant="outlined" color="primary" onClick={onClose}>Exit Analyzer</Button>
                        </Box>
                        <Box sx={{ flex: 1, position: 'relative', bgcolor: 'rgba(255,255,255,0.02)', borderRadius: 2 }}>
                            <canvas ref={canvasRef}></canvas>
                        </Box>
                    </Box>
                </Dialog>
            );
        }

        function EliteChart({ data, type="bar", onZoomClick }) {
            const canvasRef = React.useRef(null);
            const chartRef = React.useRef(null);

            React.useEffect(() => {
                if (canvasRef.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    chartRef.current = new Chart(canvasRef.current, {
                        type, data,
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false, 
                            scales: { y: { beginAtZero: true, grid: { color: '#222' } }, x: { grid: { display: false } } } 
                        }
                    });
                }
            }, [data, type]);

            return (
                <Box sx={{ width: '100%', height: '100%', position: 'relative' }}>
                    <canvas ref={canvasRef}></canvas>
                    <IconButton size="small" sx={{ position: 'absolute', top: 0, right: 0, bgcolor: 'background.paper', zIndex: 10 }} onClick={onZoomClick}>🔍</IconButton>
                </Box>
            );
        }

        // --- Primary Pages ---
        function QuantumTerminal() {
            const [target, setTarget] = React.useState(0);
            const [probs, setProbs] = React.useState([1, 0, 0, 0, 0, 0, 0, 0]);
            const [labels, setLabels] = React.useState(['|000⟩','|001⟩', '|010⟩', '|011⟩', '|100⟩', '|101⟩', '|110⟩', '|111⟩']);
            const [zoomOpen, setZoomOpen] = React.useState(false);
            const blochRef = React.useRef(null);

            React.useEffect(() => {
                const container = document.getElementById('bloch-3d');
                if(!container || blochRef.current) return;
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(45, 1.33, 0.1, 1000);
                camera.position.set(2, 2, 2.5);
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(container.clientWidth, container.clientHeight);
                container.appendChild(renderer.domElement);
                const sphere = new THREE.Mesh(new THREE.SphereGeometry(1, 48, 48), new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true, transparent: true, opacity: 0.1 }));
                scene.add(sphere);
                const arrow = new THREE.ArrowHelper(new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,0), 1, 0x00f2ff);
                scene.add(arrow);
                blochRef.current = { renderer, arrow, scene, camera };
                const animate = () => { if(blochRef.current) { requestAnimationFrame(animate); renderer.render(scene, camera); } };
                animate();
            }, []);

            const exec = async (gate) => {
                try {
                    const res = await fetch('/api/quantum/gate', {
                        method: 'POST',
                        headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ gate, target, control: null })
                    });
                    const data = await res.json();
                    setProbs(data.probabilities);
                    setLabels(data.labels || labels);
                    if(blochRef.current) blochRef.current.arrow.setDirection(new THREE.Vector3(Math.sin(data.theta)*Math.cos(data.phi), Math.cos(data.theta), Math.sin(data.theta)*Math.sin(data.phi)));
                } catch(e) { console.error("Quantum Error", e); }
            };

            const chartData = { labels, datasets: [{ label: 'Probability', data: probs, backgroundColor: 'rgba(0, 242, 255, 0.5)', borderColor: '#00f2ff', borderWidth: 1 }] };

            return (
                <Grid container spacing={4}>
                    <Grid item xs={12} md={7}>
                        <Paper sx={{ p: 4 }}>
                            <Typography variant="h4" className="neon-text" sx={{ mb: 4, fontFamily: 'Orbitron' }}>Quantum Logic</Typography>
                            <Box sx={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 2 }}>
                                <Button variant="contained" onClick={() => exec('H')}>Hadamard (H)</Button>
                                <Button variant="contained" onClick={() => exec('X')}>Pauli-X (NOT)</Button>
                                <Button variant="contained" onClick={() => exec('Y')}>Pauli-Y</Button>
                                <Button variant="contained" onClick={() => exec('Z')}>Pauli-Z</Button>
                                <Button variant="outlined" color="primary" sx={{ gridColumn: 'span 2' }} onClick={() => exec('SUPERPOSITION')}>Global Superposition (Σ)</Button>
                                <Button variant="outlined" color="error" sx={{ gridColumn: 'span 2' }} onClick={() => exec('RESET')}>Reset Register</Button>
                            </Box>
                        </Paper>
                    </Grid>
                    <Grid item xs={12} md={5}>
                        <Paper sx={{ p: 2, height: 320 }}><div id="bloch-3d" style={{ height: '100%' }}></div></Paper>
                        <Paper sx={{ p: 3, mt: 3, height: 280 }}>
                            <EliteChart data={chartData} onZoomClick={() => setZoomOpen(true)} />
                        </Paper>
                    </Grid>
                    <ZoomChartDialog open={zoomOpen} onClose={() => setZoomOpen(false)} chartData={chartData} title="Wavefunction Probability Map" />
                </Grid>
            );
        }

        // --- Main App ---
        function App() {
            const [path, setPath] = React.useState(window.location.pathname);
            const navigate = (to) => { window.history.pushState({}, '', to); setPath(to); };

            return (
                <ThemeProvider theme={theme}>
                    <CssBaseline />
                    <Box sx={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
                        <AppBar position="sticky" sx={{ background: 'rgba(10, 10, 21, 0.95)', borderBottom: '1px solid rgba(0, 242, 255, 0.1)' }}>
                            <Toolbar sx={{ justifyContent: 'space-between' }}>
                                <Typography variant="h6" sx={{ fontFamily: 'Orbitron', letterSpacing: 2, color: '#00f2ff' }}>QUANTUM AI</Typography>
                                <Box sx={{ display: 'flex', gap: 1 }}>
                                    <Button color="inherit" onClick={() => navigate('/quantum')}>Workspace</Button>
                                    <Button color="secondary" variant="outlined" sx={{ml:2}} onClick={() => window.location.reload()}>Reload Hub</Button>
                                </Box>
                            </Toolbar>
                        </AppBar>

                        <Container maxWidth="xl" sx={{ flex: 1, py: 6 }}>
                            {path === '/quantum' ? <QuantumTerminal /> : (
                                <Box sx={{ textAlign: 'center', py: 15 }}>
                                    <Typography variant="h2" sx={{ fontFamily: 'Orbitron', mb: 4 }} className="neon-text">Quantum AI</Typography>
                                    <Typography variant="body1" sx={{ color: 'text.secondary', mb: 6, maxWidth: 600, mx: 'auto' }}>
                                        Bridging the gap between qubit decoherence and neural synaptic evolution.
                                    </Typography>
                                    <Button variant="contained" size="large" onClick={() => navigate('/quantum')} sx={{ px: 6, py: 2 }}>
                                        Initialize Workspace
                                    </Button>
                                </Box>
                            )}
                        </Container>
                    </Box>
                </ThemeProvider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        console.log("Elite React: UI Rendered Successfully.");
    </script>
</body>
</html>
