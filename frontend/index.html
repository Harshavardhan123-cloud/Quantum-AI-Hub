<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum AI | Ultimate Edition</title>
    
    <!-- React & MUI Core (JSDelivr) -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emotion/react@11/dist/emotion-react.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emotion/styled@11/dist/emotion-styled.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mui/material@5.14.0/umd/material-ui.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; background-color: #03030b; color: #fff; overflow-x: hidden; font-family: 'Inter', sans-serif; }
        #root { position: relative; z-index: 10; min-height: 100vh; }
        .neon-text { text-shadow: 0 0 10px rgba(0, 242, 255, 0.8), 0 0 20px rgba(0, 242, 255, 0.3); }
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.5; }
        .loading-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: #03030b; color: #00f2ff; font-family: Orbitron; letter-spacing: 5px; }
        .glass-box { background: rgba(10, 10, 25, 0.9) !important; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1) !important; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .weight-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 8px; }
        .weight-cell { aspect-ratio: 1; border-radius: 2px; transition: all 0.3s ease; }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div id="root">
        <div class="loading-screen">NEURAL CORE SEQUENCING...</div>
    </div>

    <script type="text/babel">
        const { 
            ThemeProvider, createTheme, CssBaseline, Box, AppBar, Toolbar, Typography, 
            Button, Container, Dialog, IconButton, Fade, Table, TableBody, 
            TableCell, TableHead, TableRow, Grid, Paper, Select, MenuItem, Divider, LinearProgress, CircularProgress
        } = MaterialUI;

        // --- THEME ---
        const theme = createTheme({
            palette: { mode: 'dark', primary: { main: '#00f2ff' }, secondary: { main: '#7000ff' }, background: { default: '#03030b', paper: '#0a0a1a' } },
            typography: { fontFamily: 'Inter, sans-serif', h1: { fontFamily: 'Orbitron', fontWeight: 900 } }
        });

        // --- SYSTEM: Particles ---
        function initParticles() {
            const canvas = document.getElementById('particle-canvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: Math.random() * 0.5 - 0.25, vy: Math.random() * 0.5 - 0.25, size: Math.random() * 2 });
            }
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'rgba(0, 242, 255, 0.3)';
                particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        // --- SHARED: Zoom Dialog ---
        function ZoomChartDialog({ open, onClose, chartData, title, type="bar" }) {
            const canvasRef = React.useRef(null);
            const chartRef = React.useRef(null);
            React.useEffect(() => {
                if (open && canvasRef.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    chartRef.current = new Chart(canvasRef.current, { type, data: chartData, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: 'white' } } } } });
                }
            }, [open, chartData]);
            return (
                <Dialog fullScreen open={open} onClose={onClose} TransitionComponent={Fade}>
                    <Box sx={{ p: 4, height: '100vh', display: 'flex', flexDirection: 'column', bgcolor: '#03030b' }}>
                        <Box sx={{ display: 'flex', justifyContent: 'space-between', mb: 3 }}>
                            <Typography variant="h4" sx={{ fontFamily: 'Orbitron', color: '#00f2ff' }}>{title}</Typography>
                            <Button variant="outlined" color="primary" onClick={onClose}>Exit Analyzer</Button>
                        </Box>
                        <Box sx={{ flex: 1, bgcolor: '#000', p: 4, borderRadius: 2 }}><canvas ref={canvasRef}></canvas></Box>
                    </Box>
                </Dialog>
            );
        }

        function EliteChart({ data, type="bar", onZoomClick }) {
            const canvasRef = React.useRef(null);
            const chartRef = React.useRef(null);
            React.useEffect(() => {
                if (canvasRef.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    chartRef.current = new Chart(canvasRef.current, { type, data, options: { responsive: true, maintainAspectRatio: false, scales: { y: { grid: { color: '#222' } } } } });
                }
            }, [data, type]);
            return (
                <Box sx={{ width: '100%', height: '100%', position: 'relative' }}>
                    <canvas ref={canvasRef}></canvas>
                    <IconButton size="small" sx={{ position: 'absolute', top: 0, right: 0, bgcolor: 'rgba(0,0,0,0.5)' }} onClick={() => onZoomClick(data, type)}>🔍</IconButton>
                </Box>
            );
        }

        // --- PAGE: Quantum Workspace (Professional Overhaul) ---
        function QuantumTerminal() {
            const [n, setN] = React.useState(3);
            const [target, setTarget] = React.useState(0);
            const [control, setControl] = React.useState(1);
            const [probs, setProbs] = React.useState([1, 0, 0, 0, 0, 0, 0, 0]);
            const [labels, setLabels] = React.useState(['|000⟩','|001⟩','|010⟩','|011⟩','|100⟩','|101⟩','|110⟩','|111⟩']);
            const [circuitHistory, setCircuitHistory] = React.useState([]);
            const [zoomOpen, setZoomOpen] = React.useState(false);
            const [blochState, setBlochState] = React.useState({ theta: 0, phi: 0 });
            const blochRef = React.useRef(null);

            React.useEffect(() => {
                const container = document.getElementById('bloch-3d');
                if(!container || blochRef.current) return;
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 1000);
                camera.position.set(2.5, 1.5, 2.5);
                camera.lookAt(0,0,0);
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(container.clientWidth, container.clientHeight);
                container.appendChild(renderer.domElement);
                const sphere = new THREE.Mesh(new THREE.SphereGeometry(1, 48, 48), new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true, transparent: true, opacity: 0.05 }));
                scene.add(sphere);
                const axes = new THREE.Group();
                const mat = new THREE.LineBasicMaterial({color: 0x333});
                axes.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-1.2,0,0), new THREE.Vector3(1.2,0,0)]), mat));
                axes.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,-1.2,0), new THREE.Vector3(0,1.2,0)]), mat));
                axes.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,-1.2), new THREE.Vector3(0,0,1.2)]), mat));
                scene.add(axes);
                const arrow = new THREE.ArrowHelper(new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,0), 1, 0x00f2ff, 0.1, 0.05);
                scene.add(arrow);
                blochRef.current = { renderer, arrow, scene, camera };
                const animate = () => { if(blochRef.current) { requestAnimationFrame(animate); renderer.render(scene, camera); } };
                animate();
            }, []);

            const exec = async (gate) => {
                const res = await fetch('/api/quantum/gate', { 
                    method: 'POST', 
                    headers: {'Content-Type':'application/json'}, 
                    body: JSON.stringify({ gate, target, control: gate === 'CNOT' ? control : null }) 
                });
                const data = await res.json();
                setProbs(data.probabilities);
                setLabels(data.labels || labels);
                setBlochState({ theta: data.theta, phi: data.phi });
                if(blochRef.current) {
                    blochRef.current.arrow.setDirection(new THREE.Vector3(Math.sin(data.theta)*Math.cos(data.phi), Math.cos(data.theta), Math.sin(data.theta)*Math.sin(data.phi)));
                }
                if(gate !== 'RESET') setCircuitHistory(prev => [...prev, { gate, target, control: gate === 'CNOT' ? control : null }].slice(-10));
                else setCircuitHistory([]);
            };

            const changeN = async (v) => {
                setN(v); await fetch('/api/quantum/config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ n: v }) });
                setCircuitHistory([]); exec('RESET');
            };

            return (
                <Grid container spacing={3}>
                    <Grid item xs={12} lg={4}>
                        <Paper sx={{ p: 4, height: '100%', position: 'relative' }} className="glass-box">
                            <Box sx={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '4px', background: 'linear-gradient(90deg, #00f2ff, #7000ff)' }} />
                            <Typography variant="h5" sx={{ mb: 1, fontFamily: 'Orbitron', fontWeight: 900 }}>QUANTUM LAB <span style={{color: '#00f2ff'}}>Ω</span></Typography>
                            <Typography variant="caption" sx={{ color: 'grey.600', mb: 3, display: 'block' }}>HILBERT STATE TERMINAL v17</Typography>
                            <Box sx={{ mt: 3 }}>
                                <Typography variant="caption" color="primary">REGISTER SCALE</Typography>
                                <Box sx={{ display: 'flex', gap: 1, mt: 1 }}>{[2, 3, 4, 5].map(v => <Button key={v} variant={n === v ? "contained" : "outlined"} onClick={() => changeN(v)} size="small">N={v}</Button>)}</Box>
                            </Box>
                            <Grid container spacing={2} sx={{ my: 3 }}>
                                <Grid item xs={6}><Typography variant="caption" color="primary">TARGET</Typography><Select fullWidth value={target} onChange={(e)=>setTarget(e.target.value)} size="small" sx={{ mt: 1 }}>{[...Array(n)].map((_, i) => <MenuItem key={i} value={i}>Qubit {i}</MenuItem>)}</Select></Grid>
                                <Grid item xs={6}><Typography variant="caption" color="primary">CONTROL</Typography><Select fullWidth value={control} onChange={(e)=>setControl(e.target.value)} size="small" sx={{ mt: 1 }}>{[...Array(n)].map((_, i) => <MenuItem key={i} value={i}>Qubit {i}</MenuItem>)}</Select></Grid>
                            </Grid>
                            <Box sx={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 1.5 }}>
                                {['H', 'X', 'Y', 'Z'].map(g => <Button key={g} variant="contained" color="secondary" onClick={() => exec(g)} sx={{ fontWeight: 900 }}>{g}</Button>)}
                                <Button variant="contained" color="primary" fullWidth sx={{ gridColumn: 'span 2', fontWeight: 900 }} onClick={() => exec('CNOT')}>CNOT</Button>
                                <Button variant="outlined" color="primary" fullWidth sx={{ gridColumn: 'span 2' }} onClick={() => exec('SUPERPOSITION')}>Σ ALL</Button>
                                <Button variant="text" color="error" fullWidth sx={{ gridColumn: 'span 4', mt: 1 }} onClick={() => exec('RESET')}>SYSTEM RESET</Button>
                            </Box>
                        </Paper>
                    </Grid>
                    <Grid item xs={12} lg={8}>
                        <Paper sx={{ p: 0, height: 320, mb: 3, position: 'relative', overflow: 'hidden' }} className="glass-box">
                            <Box sx={{ p: 2, bgcolor: 'rgba(255,255,255,0.02)', borderBottom: '1px solid rgba(255,255,255,0.05)' }}><Typography variant="caption" color="primary">CIRCUIT EXECUTION TRACE</Typography></Box>
                            <Box sx={{ p: 4, display: 'flex', flexDirection: 'column', gap: 4, overflowX: 'auto' }}>
                                {[...Array(n)].map((_, qIdx) => (
                                    <Box key={qIdx} sx={{ position: 'relative', height: '2px', bgcolor: 'rgba(0, 242, 255, 0.1)', width: '100%', minWidth: 600 }}>
                                        <Typography variant="caption" sx={{ position: 'absolute', left: -30, top: -8, color: '#00f2ff', fontSize: '0.6rem' }}>Q{qIdx}</Typography>
                                        <Box sx={{ display: 'flex', position: 'absolute', top: -14, left: 10, gap: 4 }}>
                                            {circuitHistory.map((h, hIdx) => (
                                                h.target === qIdx ? <Paper key={hIdx} sx={{ width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center', bgcolor: h.gate==='CNOT'?'primary.main':'secondary.main', color: 'black', fontWeight: 900, fontSize: '0.6rem' }}>{h.gate}</Paper> :
                                                h.gate === 'CNOT' && h.control === qIdx ? <Box key={hIdx} sx={{ width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Box sx={{ width: 8, height: 8, borderRadius: '50%', bgcolor: 'primary.main' }} /></Box> : <Box key={hIdx} sx={{ width: 28, height: 28 }} />
                                            ))}
                                        </Box>
                                    </Box>
                                ))}
                            </Box>
                        </Paper>
                        <Grid container spacing={3}>
                            <Grid item xs={6}><Paper sx={{ p: 3, height: 350 }} className="glass-box"><Typography variant="caption" color="primary">HOLOGRAPHIC BLOCH</Typography><div id="bloch-3d" style={{ height: 260 }}></div></Paper></Grid>
                            <Grid item xs={6}><Paper sx={{ p: 3, height: 350 }} className="glass-box"><Typography variant="caption" color="primary">PROBABILITY DENSITY</Typography><Box sx={{ height: 260 }}><EliteChart data={{ labels, datasets: [{ label: 'State Prob', data: probs, backgroundColor: 'rgba(0, 242, 255, 0.4)', borderColor: '#00f2ff', borderWidth: 1 }] }} onZoomClick={() => setZoomOpen(true)} /></Box></Paper></Grid>
                        </Grid>
                    </Grid>
                    <ZoomChartDialog open={zoomOpen} onClose={() => setZoomOpen(false)} chartData={{ labels, datasets: [{ label: 'State Map', data: probs, backgroundColor: '#00f2ff' }] }} title="Analytical Wavefunction Trace" />
                </Grid>
            );
        }

        // --- PAGE: Hebbian Engine ---
        function HebbianWorkbench() {
            const [rule, setRule] = React.useState('oja');
            const [weightStats, setWeightStats] = React.useState(Array(100).fill(0.1));
            const [latentData, setLatentData] = React.useState({ labels: [], datasets: [{ label: 'Latent X', data: [], borderColor: '#7000ff', fill: false }] });
            const [loading, setLoading] = React.useState(false);
            const [zoomOpen, setZoomOpen] = React.useState(false);

            const runTrial = async (isBatch = false) => {
                setLoading(true);
                const endpoint = isBatch ? '/api/analyze/hebbian_batch' : '/api/analyze/hebbian';
                const body = isBatch ? { samples: 20, rule } : { data: Array.from({length:10}, ()=>Math.random()), rule };
                const res = await fetch(endpoint, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
                const data = await res.json();
                
                if(isBatch) {
                    const finalRes = data.results[data.results.length - 1];
                    setWeightStats(finalRes.weights.concat(Array(100).fill(0)).slice(0, 100));
                    setLatentData({ labels: data.results.map((_,i)=>i), datasets: [{ ...latentData.datasets[0], data: data.results.map(r => r.latent_x) }] });
                } else {
                    setWeightStats(data.weight_stats.concat(Array(100).fill(0)).slice(0, 100));
                    setLatentData(prev => ({ labels: [...prev.labels, ""].slice(-20), datasets: [{ ...prev.datasets[0], data: [...prev.datasets[0].data, data.projection[0]].slice(-20) }] }));
                }
                setLoading(false);
            };

            return (
                <Grid container spacing={4}>
                    <Grid item xs={12} md={4}>
                        <Paper sx={{ p: 4 }} className="glass-box">
                            <Typography variant="h4" className="neon-text" sx={{ mb: 4, fontFamily: 'Orbitron' }}>Hebbian Workspace</Typography>
                            <Box sx={{ mb: 3 }}>
                                <Typography variant="caption" color="primary">LEARNING ARCHITECTURE</Typography>
                                <Select fullWidth value={rule} onChange={(e)=>setRule(e.target.value)} size="small" sx={{mt:1}}>
                                    <MenuItem value="oja">Oja's Rule (Principal Component)</MenuItem>
                                    <MenuItem value="sanger">Sanger's Rule (Recursive)</MenuItem>
                                    <MenuItem value="bcm">BCM Rule (Synaptic Scaling)</MenuItem>
                                </Select>
                            </Box>
                            <Button variant="contained" fullWidth size="large" onClick={() => runTrial(false)} sx={{ mb: 2 }} disabled={loading}>Single Sequence</Button>
                            <Button variant="outlined" color="primary" fullWidth size="large" onClick={() => runTrial(true)} disabled={loading}>Batch Training (20x)</Button>
                        </Paper>
                        <Paper sx={{ p: 4, mt: 3 }} className="glass-box">
                            <Typography variant="caption" color="primary">SYNAPTIC WEIGHT MATRIX (STAB)</Typography>
                            <div className="weight-grid" style={{marginTop: 15}}>{weightStats.map((w,i)=><div key={i} className="weight-cell" style={{ background: `rgba(0, 242, 255, ${w*5})` }} />)}</div>
                        </Paper>
                    </Grid>
                    <Grid item xs={12} md={8}>
                        <Paper sx={{ p: 4, height: '100%', minHeight: 450 }} className="glass-box">
                            <Box sx={{ display: 'flex', justifyContent: 'space-between' }}>
                                <Typography variant="caption" color="primary">LATENT SPACE PROJECTION</Typography>
                                {loading && <CircularProgress size={16} />}
                            </Box>
                            <Box sx={{ height: 380, mt: 2 }}><EliteChart data={latentData} type="line" onZoomClick={() => setZoomOpen(true)} /></Box>
                        </Paper>
                    </Grid>
                    <ZoomChartDialog open={zoomOpen} onClose={() => setZoomOpen(false)} chartData={latentData} title="Neural Trajectory Analysis" type="line" />
                </Grid>
            );
        }

        // --- PAGE: System Logs ---
        function SystemLogs() {
            const [logs, setLogs] = React.useState([]);
            React.useEffect(() => { fetch('/api/logs').then(r=>r.json()).then(setLogs); initParticles(); }, []);
            return (
                <Paper sx={{ p: 4 }} className="glass-box">
                    <Typography variant="h4" className="neon-text" sx={{ mb: 4, fontFamily: 'Orbitron' }}>Simulation History</Typography>
                    <Table size="small">
                        <TableHead sx={{ bgcolor: 'rgba(0,242,255,0.08)' }}>
                            <TableRow><TableCell sx={{color:'primary.main'}}>TIMESTAMP</TableCell><TableCell sx={{color:'primary.main'}}>TYPE</TableCell><TableCell sx={{color:'primary.main'}}>OPERATION</TableCell><TableCell sx={{color:'primary.main'}}>SNAPSHOT</TableCell></TableRow>
                        </TableHead>
                        <TableBody>
                            {logs.map((L,i)=>(
                                <TableRow key={i}>
                                    <TableCell sx={{color:'grey.500', fontSize:'0.7rem'}}>{new Date(L.timestamp).toLocaleTimeString()}</TableCell>
                                    <TableCell><Box sx={{ bgcolor: L.type==='quantum'?'primary.main':'secondary.main', color:'black', px:1, borderRadius:0.5, fontSize:'0.6rem', display:'inline-block' }}>{L.type.toUpperCase()}</Box></TableCell>
                                    <TableCell sx={{ fontSize:'0.8rem' }}>{L.description}</TableCell>
                                    <TableCell sx={{ fontFamily:'Fira Code', fontSize:'0.6rem', color:'grey.700' }}>{JSON.stringify(L.result_data).substring(0,60)}...</TableCell>
                                </TableRow>
                            ))}
                        </TableBody>
                    </Table>
                </Paper>
            );
        }

        // --- APP: Navigation ---
        function App() {
            const [path, setPath] = React.useState(window.location.pathname);
            const navigate = (to) => { window.history.pushState({}, '', to); setPath(to); };
            React.useEffect(() => { initParticles(); }, []);
            return (
                <ThemeProvider theme={theme}>
                    <CssBaseline />
                    <AppBar position="sticky" sx={{ background: 'rgba(5, 5, 15, 0.98)', borderBottom: '1px solid rgba(0, 242, 255, 0.2)' }}>
                        <Toolbar sx={{ justifyContent: 'space-between' }}>
                            <Box sx={{ display: 'flex', alignItems: 'center', gap: 2 }}>
                                <Typography variant="h6" sx={{ fontFamily: 'Orbitron', color: 'primary.main', fontWeight: 900, letterSpacing: 2 }}>QUANTUM AI</Typography>
                                <Box sx={{ bgcolor: 'primary.main', color: 'black', px: 1, borderRadius: 1, fontSize: '0.6rem', fontWeight: 900 }}>ELITE v16</Box>
                            </Box>
                            <Box sx={{ display: 'flex', gap: 1 }}>
                                <Button color="inherit" onClick={() => navigate('/')}>HUB</Button>
                                <Button color="inherit" onClick={() => navigate('/quantum')}>QUANTUM</Button>
                                <Button color="inherit" onClick={() => navigate('/hebbian')}>HEBBIAN</Button>
                                <Button color="inherit" onClick={() => navigate('/history')}>LOGS</Button>
                            </Box>
                        </Toolbar>
                    </AppBar>
                    <Container maxWidth="xl" sx={{ flex: 1, py: 6 }}>
                        {path === '/' && (
                            <Box sx={{ textAlign: 'center', py: 15 }}>
                                <Typography variant="h1" className="neon-text" sx={{ mb: 2 }}>Quantum AI</Typography>
                                <Typography variant="body1" sx={{ color: 'text.secondary', mb: 6, maxWidth: 650, mx: 'auto', lineHeight: 1.8 }}>Unified Artificial Intelligence Platform. Specialized in high-dimensional Hilbert space logic and unsupervised biological learning simulation.</Typography>
                                <Box sx={{ display: 'flex', gap: 2, justifyContent: 'center' }}>
                                    <Button variant="contained" size="large" onClick={() => navigate('/quantum')} sx={{ px: 6 }}>Quantum Laboratory</Button>
                                    <Button variant="outlined" size="large" onClick={() => navigate('/hebbian')} sx={{ px: 6 }}>Neural Workspace</Button>
                                </Box>
                            </Box>
                        )}
                        {path === '/quantum' && <QuantumTerminal />}
                        {path === '/hebbian' && <HebbianWorkbench />}
                        {path === '/history' && <SystemLogs />}
                    </Container>
                </ThemeProvider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
